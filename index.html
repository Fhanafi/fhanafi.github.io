<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>_Han</title>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha256-LFdVJkHpZ6llKH3Vl53nfuxDSO2NXJFoaKqNTJH27HY=" crossorigin="anonymous">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: rgba(0,0,0, 0,5);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
  .overlay-box {
      position: relative;
      z-index: 2;
      background-color: rgba(255, 255, 255);
      padding: 20px;
      border-radius: 10px;
      max-width: 250px;
      margin: 0 auto;
      text-align: center;
    }

    .intro-text {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .profile-image {
      width: 100%;
      border-radius: 5px;
    }

    .profile-name {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .profile-description {
      font-size: 12px;
    }
    
    .social-icons {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .social-icon {
      margin: 0 3px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .social-icon img {
      width: 90%;
      height: auto;
      display: none;
    }
    
    a {
      color: black;
    }
    
    #pp {
      border-radius: 50%;
      border: 3px solid black;
      width: 50%;
    }
  </style>
</head>
<body>
  <div id="particles-js"></div>
<div class="overlay-box">
    <!--<img class="profile-image" src="https://example.com/path/to/your/image.jpg" alt="Han's Profile">-->
    <div class="intro-text">
      <img id="pp" src="https://iili.io/JEWfkQe.md.png"/>
      <p class="profile-name">Hello, I'm Han</p>
      <p class="profile-description">Fullstack Developer and Bug Hunter with a passion for IoT and now I focus to learn blockchain. Proficient in JavaScript,Python and Java, I create seamless and efficient solutions across the entire software stack, for portofolio please checked Me <a href="#">Github</a></p>
    </div>
    <div class="social-icons">
      <div class="social-icon"><a href="https://www.codewars.com/users/Fhanafi"><img src="https://iili.io/JEWX5pR.md.png"></a></div>
      <div class="social-icon"><a href="https://www.kaggle.com/faisalhanafi112"><img src="https://iili.io/JEWISdg.md.png"></a></div>
      <div class="social-icon"><a href="https://www.freecodecamp.org/H4N"><img src="https://iili.io/JEWXiZB.md.png"></a></div>
      <div class="social-icon"><a href="https://www.hackthebox.com/home/users/profile/1121695"><img src="https://iili.io/JEWhF6X.md.png"></a></div>
      <div class="social-icon"><a href="https://wokwi.com/makers/han_v1"><img src="https://iili.io/JEWhzt2.md.png"></a></div>
    </div>
  </div>
  <script>
    particlesJS('particles-js', {
      "particles": {
        "number": {
          "value": 80,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#000000"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          },
          "polygon": {
            "nb_sides": 5
          },
          "image": {
            "src": "img/github.svg",
            "width": 100,
            "height": 100
          }
        },
        "opacity": {
          "value": 0.7, 
          "random": false,
          "anim": {
            "enable": false,
            "speed": 1,
            "opacity_min": 0.1,
            "sync": false
          }
        },
        "size": {
          "value": 5,
          "random": true,
          "anim": {
            "enable": false,
            "speed": 40,
            "size_min": 0.1,
            "sync": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#000000",  
          "opacity": 0.4,  
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 6,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": {
            "enable": false,
            "rotateX": 600,
            "rotateY": 1200
          }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "repulse"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 400,
            "line_linked": {
              "opacity": 1
            }
          },
          "bubble": {
            "distance": 400,
            "size": 40,
            "duration": 2,
            "opacity": 8,
            "speed": 3
          },
          "repulse": {
            "distance": 200,
            "duration": 0.4
          },
          "push": {
            "particles_nb": 4
          },
          "remove": {
            "particles_nb": 2
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
